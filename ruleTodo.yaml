  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索的周围8格的某一格是风云格，这一格的位置全盘共享，一个线索的风云格上如果有一列中的最低的雷，则这个雷对于这个线索来说雷值为0。
  name: 3T*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷的周围8格的某一格是风云格，这一格的位置全盘共享，一个雷的风云格上如果有一列中的最高的雷，则这个雷的雷值是2。
  name: 3M^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷的周围8格的某一格是风云格，这一格的位置全盘共享，一个雷的风云格上如果有一列中的最低的雷，则这个雷的雷值是0。
  name: 3M*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷和最低的雷的周围四格都恰有一雷。
