  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷和最低的雷的高度差都被该列的字母标号代替，如果某一列X的最高的雷和最低的雷的高度差是N，则题板上X=N的格子必须是雷，主板样式同2E'。
  name: 3E^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 包含以下14个规则：[3U],[3D],[3A*],[3E*],[3E@],[3E%],[3P'],[3P^],[3M],[3M'],[3M%],[3C%],[3S^],[3S*]（风云代号：8,9,20,21,22,23,25,26,27,28,34,36,37,38）。
