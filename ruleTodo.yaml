  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每列中最高的雷和最低的雷中间的雷数（范围不包括该列最高的雷和最低的雷）被该列的字母标号代替，一个字母对应一个数字，一个数字对应一个字母，副板样式同2E。
