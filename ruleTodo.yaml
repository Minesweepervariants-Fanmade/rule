  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示距离它最近的两个雷之间的高度差。
  name: 3H^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示距离它最近的雷与那个雷所在列的最高的雷的高度差。
