  doc: '外围压制(Zone Exclusion): 左线规则。每个线索格周围四格雷数若大于等于2，则该格所在同区（边连通雷区域）的所有雷格均不得与棋盘外部相邻，否则盘面无解。'
  name: TEZ
  time: 1777660747.547092
- author_name: NT
  author_uid: 2201963934
  doc: '距离禁区(Neighbor Distance): 左线规则。任意两个雷格的曼哈顿距离不得小于线索格上标注的数字（若无统一数字则默认为3）。'
  name: ND
  time: 1777661021.4746313
- author_name: NT
  author_uid: 2201963934
  doc: '异矩(SlashArrow): 中线规则。每个箭头指向一个与其不同的异形矩形区域面积。'
  name: AR
  time: 1777661104.4282932
- author_name: NT
  author_uid: 2201963934
  doc: '孤矩(Isolated Rectangle): 左线规则。所有雷格恰好构成一个或多个矩形，且任意两个矩形的边或角互不接触（至少间隔一格）。'
  name: NR
  time: 1777661334.7663343
- author_name: NT
  author_uid: 2201963934
  doc: '异雷(Different Mine): 每个非雷格周围八格雷排布互不相同。'
  name: DF
  time: 1777661481.43697
- author_name: NT
  author_uid: 2201963934
  doc: '路径等式(Path Equation): 左线规则。所有雷格必须构成一条不自交的连续路径，且每条直线段上的雷格数量严格小于其相邻两段雷格数量之和。'
  name: PE
  time: 1777661640.2378173
- author_name: NT
  author_uid: 2201963934
  doc: '路径对称(Path Symmetry): 左线规则。所有雷格必须构成一条不自交的连续路径，且关于盘面的水平或垂直中线对称，路径的起点和终点至少有一个位于边界格上。'
  name: PS
  time: 1777661840.4636126
