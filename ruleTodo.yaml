  author_uid: 3086842243
  doc: 雷线索表示它到该列最高的雷或最低的雷的距离。
  name: 3R@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数。
  name: 3A*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数和它与该列最低的雷中间的雷数之和。
  name: 3E*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数和它与该列最低的雷中间的雷数（顺序不确定）。
  name: 3E@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数或它与该列最低的雷中间的雷数。
