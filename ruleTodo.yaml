  author_uid: 3086842243
  doc: 行失衡，即每行雷数各不相同。
  name: 3C~
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 行失衡，列平衡，即每行雷数各不相同，每列雷数相同。
  name: 3C@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷的高度不低于它左边一列的最高的雷的高度，每一列的最低的雷的高度不低于它左边一列的最低的雷的高度。
  name: 3R
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷的高度不低于它左边一列的最高的雷的高度，每一列的最低的雷的高度不高于它左边一列的最低的雷的高度。
  name: 3T'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷不能相互接触，每一列的最低的雷不能相互接触。
  name: 3R'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷不能相互接触（对角接触也不行），每一列的最低的雷不能相互接触（对角接触也不行）。
  name: 3R^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 设题板大小为n，每一列的最高的雷和最低的雷的高度差不低于n的一半。
  name: 3H
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 设题板大小为n，每一列的最高的雷和最低的雷的高度差不高于n的一半。
  name: 3C*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每列最低的雷的雷值为0。
  name: 3D
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示距离它最近的雷与它的高度差。
