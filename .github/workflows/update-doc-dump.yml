name: Update doc dump.json

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update-doc-dump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout doc branch
        uses: actions/checkout@v4
        with:
          ref: doc
          fetch-depth: 0

      - name: Generate dump.json from upstream
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          tmp_raw="${tmp_dir}/dump.raw.json"
          tmp_json="${tmp_dir}/dump.json"
          git clone --recursive https://github.com/Minesweepervariants-Fanmade/MinesweeperVariants "${tmp_dir}/upstream"

          python -m pip install --upgrade pip
          python -m pip install "${tmp_dir}/upstream"

          pushd "${tmp_dir}/upstream" >/dev/null
          python -m minesweepervariants list --json > "${tmp_raw}"
          popd >/dev/null

          echo "----- BEGIN GENERATED RAW OUTPUT -----"
          cat "${tmp_raw}"
          echo "----- END GENERATED RAW OUTPUT -----"

          python -m json.tool "${tmp_raw}" > "${tmp_json}"
          test -s "${tmp_json}"

          # Keep doc branch content strictly to dump.json.
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mv "${tmp_json}" "${GITHUB_WORKSPACE}/dump.json"

      - name: Validate dump.json
        shell: bash
        run: |
          set -euo pipefail
          test -s dump.json
          python -m json.tool dump.json >/dev/null

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(doc): update dump.json"
          git push origin doc