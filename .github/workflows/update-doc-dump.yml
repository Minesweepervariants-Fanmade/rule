name: Update doc dump.json

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update-doc-dump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout doc branch
        uses: actions/checkout@v4
        with:
          ref: doc
          fetch-depth: 0

      - name: Generate dump.json from upstream
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          tmp_raw="${tmp_dir}/dump.raw.json"
          tmp_json="${tmp_dir}/dump.json"
          git clone --recursive https://github.com/Minesweepervariants-Fanmade/MinesweeperVariants "${tmp_dir}/upstream"

          pushd "${tmp_dir}/upstream/minesweepervariants/impl/rule" >/dev/null
          git fetch origin master
          git checkout master
          git pull --ff-only origin master
          popd >/dev/null

          python -m pip install --upgrade pip
          python -m pip install "${tmp_dir}/upstream"

          pushd "${tmp_dir}/upstream" >/dev/null
          python -m minesweepervariants list --json > "${tmp_raw}"
          popd >/dev/null

          if ! python -m json.tool "${tmp_raw}" > "${tmp_json}"; then
            echo "----- BEGIN GENERATED RAW OUTPUT (ON FAILURE) -----"
            cat "${tmp_raw}"
            echo "----- END GENERATED RAW OUTPUT (ON FAILURE) -----"
            exit 1
          fi
          test -s "${tmp_json}"

          mv "${tmp_json}" "${GITHUB_WORKSPACE}/dump.json"

      - name: Validate dump.json
        shell: bash
        run: |
          set -euo pipefail
          test -s dump.json
          python -m json.tool dump.json >/dev/null

      - name: Commit and push if changed
        uses: IAreKyleW00t/verified-bot-commit@v2.3.0
        with:
          files: dump.json
          message: "chore(doc): update dump.json"
          ref: doc
          token: ${{ secrets.GITHUB_TOKEN }}